exclude: '^(?:\\.venv(?:[-_].*)?|\\.venv-tools|\\.venvprincipal|venv|\.venv/).*'
repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black --line-length 120
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: isort --profile black
        language: system
        types: [python]

      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]

      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]

      - id: json-validate
        name: json-validate
        entry: bash -c 'for f; do python -m json.tool "${f}" >/dev/null; done'
        language: system
        files: "\\.json$"
